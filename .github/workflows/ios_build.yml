name: iOS Build — iCamera

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter 3.41.2
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update
          echo "=== Podfile.lock ===" && cat Podfile.lock

      - name: Disable code signing for CI
        run: |
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' ios/Runner.xcodeproj/project.pbxproj
          echo 'CODE_SIGNING_ALLOWED = NO' >> ios/Flutter/Release.xcconfig
          echo 'CODE_SIGNING_REQUIRED = NO' >> ios/Flutter/Release.xcconfig
          echo 'CODE_SIGN_IDENTITY = ' >> ios/Flutter/Release.xcconfig

      - name: Build iOS release (no code signing)
        run: flutter build ios --release --no-codesign --verbose 2>&1 | tee /tmp/build.log; exit ${PIPESTATUS[0]}

      - name: Show Xcode errors on failure
        if: failure()
        run: |
          FAIL_LINE=$(grep -n "\*\* BUILD FAILED \*\*" /tmp/build.log | head -1 | cut -d: -f1)
          echo "BUILD FAILED at line $FAIL_LINE"
          START=$((FAIL_LINE - 40))
          echo "=== Lines $START to $FAIL_LINE ==="
          sed -n "${START},${FAIL_LINE}p" /tmp/build.log

      - name: List frameworks in built app
        run: |
          echo "=== Frameworks in Runner.app ===" && ls build/ios/iphoneos/Runner.app/Frameworks/ 2>/dev/null || echo "(no Frameworks directory)"
          echo "=== Runner.app top-level ===" && ls build/ios/iphoneos/Runner.app/

      - name: Ad-hoc sign app and all nested frameworks
        run: |
          find build/ios/iphoneos/Runner.app/Frameworks -name "*.framework" 2>/dev/null | while read fw; do
            codesign --force --sign - "$fw"
          done
          codesign --force --sign - build/ios/iphoneos/Runner.app

      - name: Package IPA
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -ry ../iCamera.ipa Payload/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: iCamera-iOS-unsigned
          path: build/ios/iCamera.ipa
          retention-days: 30
          if-no-files-found: error
